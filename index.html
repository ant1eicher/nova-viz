<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova Viz — Chart Index</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 40px 24px;
    background: #0f1117; color: #e6e6e6;
    display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  p.sub { color: #9aa0a6; margin: 0 0 28px; }
  ul { list-style: none; padding: 0; margin: 0; width: 100%; max-width: 640px; }
  li {
    background: #181c26; border: 1px solid #232733; border-radius: 10px;
    margin-bottom: 12px; transition: border-color .15s;
  }
  li:hover { border-color: #ff6b81; }
  a { display: block; padding: 16px 20px; color: #e6e6e6; text-decoration: none; }
  a .title { font-weight: 600; }
  a .date { color: #9aa0a6; font-size: .8rem; float: right; }
  a .desc { color: #9aa0a6; font-size: .85rem; margin-top: 4px; }
  footer { margin-top: 32px; color: #5f6672; font-size: .75rem; }
</style>
</head>
<body>
<h1>✨ Nova Viz</h1>
<p class="sub">One-page data visualizations, published by Nova</p>
<ul>
  <li><a href="charts/2026-07-15-demo/">
    <span class="date">2026-07-15</span>
    <span class="title">🍅 Pink Tomato — Commits by Hour of Day</span>
